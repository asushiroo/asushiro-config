[mgr]
ratio = [1, 3, 4]
sort_by = "natural"
sort_sensitive = false
sort_reverse = false
sort_dir_first = true
show_hidden = true
show_symlink = true
linemode = "size_and_mtime"
scrolloff = 8
mouse_events = ["click", "scroll"]

[preview]
wrap = "yes"
tab_size = 2
max_width = 1800
max_height = 1800
image_delay = 20
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
	{ run = 'nvim %s', block = true, for = "unix" },
	{ run = 'nvim %s', block = true, for = "windows" },
]
open = [
	{ run = 'open %s', orphan = true, desc = "Open", for = "macos" },
	{ run = 'xdg-open %s', orphan = true, desc = "Open", for = "linux" },
	{ run = 'powershell -NoLogo -NoProfile -Command Start-Process -LiteralPath %s1', orphan = true, desc = "Open", for = "windows" },
]
reveal = [
	{ run = 'open -R %s', orphan = true, desc = "Reveal in Finder", for = "macos" },
	{ run = 'xdg-open %d', orphan = true, desc = "Open parent dir", for = "linux" },
	{ run = 'explorer /select,%s1', orphan = true, desc = "Reveal in Explorer", for = "windows" },
]

[open]
prepend_rules = [
	{ mime = "text/*", use = "edit" },
	{ url = "*.{json,jsonc,toml,yaml,yml,md,txt,log,conf,ini,sh,bash,zsh,fish,lua,py,rs,c,cpp,h,hpp,go,java,js,ts,tsx,jsx,css,scss,html}" , use = "edit" },
	{ url = "*.{pdf,png,jpg,jpeg,gif,webp,svg,mp4,mkv,mov,mp3,flac,wav}", use = ["open", "reveal"] },
]
